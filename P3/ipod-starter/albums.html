<html>
<head>
  <title>Album Select</title>
  <link rel="stylesheet" type="text/css" href="ipod.css"/>
</head>
<body>
  <div id="screen">
    <!-- Head bar w/ title-->
    <div class="head-bar">
      <h1 aria-labelleby="My Music">My Music</h1>
    </div>

    <!-- Currents album + info-->
    <div class= "albums-album-wrapper" aria-label = "The Currents album cover, name and artist">
      <a href="songs.html">
        <img src="images/currents.jpg" class = "albums-album-art" aria-label = "Landing page for the Currents album ">
      </a>
      <h2 class = "albums-album-name" aria-labelledby="Album: Currents"> Currents </h2>
      <h3 class = "albums-artist-name" aria-labelledby="Artist: Tame Impala"> Tame Impala </h3>
    </div>

    <!-- Telefone album + info -->
    <div class= "albums-album-wrapper" aria-label = "The Telefone album cover, name and artist">
      <img src="images/telefone.jpeg" class = "albums-album-art">
      <h2 class = "albums-album-name" aria-labelledby ="Album: Telefone"> Telefone </h2>
      <h3 class = "albums-artist-name" aria-labelledby ="Artist: Noname"> Noname </h3>
    </div>

    <!-- Cry Baby album + info -->
    <div class= "albums-album-wrapper" aria-label = "The Cry Baby album cover, name and artist">
      <img src="images/crybaby.jpg" class = "albums-album-art">
      <h2 class = "albums-album-name" aria-labelledby="Album: Cry Baby"> Cry Baby </h2>
      <h3 class = "albums-artist-name" aria-labelledby="Artist: Melanie Martinez"> Melanie Martinez </h3>
    </div>

    <!-- Coloring Book album + info -->
    <div class= "albums-album-wrapper" aria-label = "The Coloring Book album cover, name and artist">
      <img src="images/cbook.jpg" class = "albums-album-art">
      <h2 class = "albums-album-name" aria-labelledby="Album: Coloring Book"> Coloring Book </h2>
      <h3 class = "albums-artist-name" aria-labelledby="Artist: Chance The Rapper"> Chance The Rapper </h3>
    </div>
  </div>
</body>
</html>

* bg iphone img is 363x762px
* iphone 'screen' is apprx 300x530 -->
