<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <title>Song Select</title>
  <link rel="stylesheet" type="text/css" href="ipod.css"/>
</head>
<body>

  <div id="screen">
    <!-- Head bar w/ back-button-->
    <div class="head-bar-songs">
      <a href="albums.html">
        <img src="images/button.png" class="back-button" aria-label="Back button">
      </a>
    </div>

    <div class="songs-info-wrapper">
      <!-- Album cover-->
      <div>
        <img src="images/currents.jpg" class = "songs-album-art" aria-label = "The Currents album cover">
      </div>
      <!-- Album name, artist and year-->
      <div class="songs-text-info" aria-label="The Telefone album name, artist and year">
        <div><h2 class = "songs-album-name" aria-labelledby = "Album: Currents"> Currents </h2>  </div>
        <div><h3 class = "songs-artist-name" aria-labelledby = "Artist: Tame Impala"> Tame Impala </h3></div>
        <div><h3 class = "songs-album-year" aria-labelledby = "Year: 2015"> 2015</h3></div>
      </div>
    </div>

    <!-- Album tracklist-->
    <ol>
      <div class = "flex-container" aria-label = "The Current album tracklist">
        <li class = "songs-list" aria-labelledby = "Song 1: Let It Happen"> Let It Happen</li>
        <li class = "songs-list" aria-labelledby = "Song 2: Nangs"> Nangs</li>
        <li class = "songs-list" aria-labelledby = "Song 3: The Moment"> The Moment</li>
        <li class = "songs-list" aria-labelledby = "Song 4: Yes I'm Changing"> Yes I'm Chaning</li>
        <li class = "songs-list" aria-labelledby = "Song 5: Eventually"> Eventually</li>
        <li class = "songs-list" aria-labelledby = "Song 6: Gossip"> Gossip</li>
        <li class = "songs-list" aria-labelledby = "Song 7: The Less I Know The Better"> The Less I Know The Better</li>
        <li class = "songs-list" aria-labelledby = "Song 8: Past Life"> Past Life</li>
        <li class = "songs-list" aria-labelledby = "Song 9: Disciples"> Disciples</li>
        <li class = "songs-list" aria-labelledby = "Song 10: 'Cause I'm a Man"> 'Cause I'm a Man</li>
      </div>
    </ol>

  </div>


</body>
</html>
